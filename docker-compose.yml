version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: edumanage_db
    restart: always
    environment:
      POSTGRES_DB: edumanage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edumanage123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: edumanage_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: edumanage
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-edumanage123}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_refresh_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  frontend:
    build: ./frontend
    container_name: edumanage_web
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
